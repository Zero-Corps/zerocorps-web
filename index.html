<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZeroCorps LLC</title>
  <meta name="description" content="ZeroCorps LLC — a holding company and parent to a portfolio of ventures." />

  <meta property="og:title" content="ZeroCorps LLC" />
  <meta property="og:description" content="A holding company and parent to a portfolio of ventures." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://zerocorps.org" />
  <meta name="theme-color" content="#0A0A0B" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #0A0A0B;
      --red: #E10600;
      --text: #F4F4F6;
      --muted: #8B8B93;
      --hairline: rgba(244, 244, 246, 0.10);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6vh 24px;
      overflow-x: hidden;
      position: relative;
    }

    /* Soft red radial glow behind the logo */
    body::before {
      content: "";
      position: fixed;
      top: 42%;
      left: 50%;
      width: min(90vw, 720px);
      height: min(90vw, 720px);
      transform: translate(-50%, -50%);
      background: radial-gradient(
        circle,
        rgba(225, 6, 0, 0.22) 0%,
        rgba(225, 6, 0, 0.08) 34%,
        rgba(225, 6, 0, 0) 70%
      );
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 560px;
      width: 100%;
      gap: 34px;
    }

    /* Fade / rise-in on load */
    .reveal {
      opacity: 0;
      transform: translateY(14px);
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .reveal:nth-child(1) { animation-delay: 0.05s; }
    .reveal:nth-child(2) { animation-delay: 0.18s; }
    .reveal:nth-child(3) { animation-delay: 0.30s; }
    .reveal:nth-child(4) { animation-delay: 0.42s; }
    .reveal:nth-child(5) { animation-delay: 0.54s; }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo {
      width: clamp(120px, 34vw, 200px);
      height: auto;
      display: block;
      filter: drop-shadow(0 0 40px rgba(225, 6, 0, 0.28));
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    h1 {
      font-family: "Anton", "Inter", sans-serif;
      font-weight: 400;
      font-size: clamp(3rem, 13vw, 6rem);
      line-height: 0.92;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    h1 .zero { color: var(--text); }
    h1 .corps { color: var(--red); }

    .tagline {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.72rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--red);
      opacity: 0.7;
    }

    .about {
      font-size: clamp(0.95rem, 2.4vw, 1.08rem);
      line-height: 1.7;
      color: var(--text);
      max-width: 440px;
    }

    .about .dim { color: var(--muted); }

    .ventures {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      align-items: center;
      justify-content: center;
    }

    .ventures .label { color: var(--red); }
    .ventures .item { color: var(--text); }

    .contact {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .contact-label {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .contact a {
      color: var(--text);
      text-decoration: none;
      font-size: clamp(1rem, 3vw, 1.2rem);
      letter-spacing: 0.01em;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--hairline);
      transition: color 0.25s ease, border-color 0.25s ease;
    }

    .contact a:hover,
    .contact a:focus-visible {
      color: var(--red);
      border-color: var(--red);
      outline: none;
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 8vh;
      padding-top: 24px;
      width: 100%;
      max-width: 560px;
      border-top: 1px solid var(--hairline);
      text-align: center;
    }

    footer p {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @media (prefers-reduced-motion: reduce) {
      .reveal {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="logo-wrap reveal">
      <img
        class="logo"
        src="public/logo.png"
        alt="ZeroCorps LLC logo"
      />
    </div>

    <div class="brand reveal">
      <h1><span class="zero">Zero</span><span class="corps">Corps</span></h1>
      <p class="tagline">Holding Company</p>
    </div>

    <div class="reveal">
      <div class="divider" style="margin: 0 auto 26px;"></div>
      <p class="about">
        ZeroCorps LLC is a holding company &mdash; the parent to a focused
        portfolio of ventures. <span class="dim">We build, own, and operate.</span>
      </p>
    </div>

    <p class="ventures reveal">
      <span class="label">Ventures</span>
      <span class="item">Zero Maintenance &mdash; Auto Detailing</span>
    </p>

    <div class="contact reveal">
      <span class="contact-label">Get in touch</span>
      <a href="mailto:contact@zerocorps.org">contact@zerocorps.org</a>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 ZeroCorps LLC</p>
  </footer>
</body>
</html>
